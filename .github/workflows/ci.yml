name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: Compile and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Compile
        run: ./gradlew compileKotlin compileTestKotlin
      - name: Run unit tests
        # instrumentCode/instrumentTestCode share Ant taskdefs and race under
        # org.gradle.parallel=true (flaky "1 >= 1" / nested instrumentIdeaExtensions).
        # testVintage: JUnit4 ApplicationRule in a separate JVM so @TestApplication
        # teardown cannot poison PersistentFS ("Already shutdown").
        # --no-configuration-cache: testVintage mirrors IntelliJ test classpath at
        # configuration time (ExtractorService), which configuration-cache rejects.
        run: ./gradlew test testVintage --no-parallel --no-configuration-cache

  live-smoke-v1:
    name: Live smoke V1 (Nacos 2.5.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Start Nacos 2.5.3
        run: |
          docker run -d --name nacos-v1 \
            -e MODE=standalone \
            -e JVM_XMS=384m -e JVM_XMX=384m \
            -e JVM_XMN=128m \
            -p 8848:8848 \
            nacos/nacos-server:v2.5.3
          timeout 180 bash -c 'until curl -sf http://localhost:8848/nacos/v1/console/namespaces 2>/dev/null; do echo "waiting for Nacos 2.5.3..."; sleep 3; done'
      - name: Dump V1 logs on failure
        if: failure()
        run: docker logs nacos-v1 2>&1 | tail -100
      - name: Run V1 live smoke
        env:
          NACOS_LIVE_V1_ENDPOINT: http://localhost:8848
        # --no-configuration-cache: build.gradle.kts mirrors IntelliJ test JVM opens
        # onto testVintage at configuration time (ExtractorService), which breaks CC
        # even when this job only runs filtered Jupiter smoke tests.
        run: ./gradlew test --no-parallel --no-configuration-cache --tests "com.nanyin.nacos.search.services.operations.LiveSmokeTest.V1*"

  live-smoke-v3:
    name: Live smoke V3 (Nacos 3.2.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Start Nacos 3.2.3
        run: |
          # Nacos 3.x keeps Admin API auth ON by default even when NACOS_AUTH_ENABLE=false
          # (SDK/OpenAPI auth). Anonymous V3 Admin smoke needs NACOS_AUTH_ADMIN_ENABLE=false.
          docker run -d --name nacos-v3 \
            -e MODE=standalone \
            -e JVM_XMS=384m -e JVM_XMX=384m \
            -e JVM_XMN=128m \
            -e NACOS_AUTH_ENABLE=false \
            -e NACOS_AUTH_ADMIN_ENABLE=false \
            -e NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789 \
            -e NACOS_AUTH_IDENTITY_KEY=serverIdentity \
            -e NACOS_AUTH_IDENTITY_VALUE=security \
            -p 8848:8848 \
            nacos/nacos-server:v3.2.3
          timeout 360 bash -c '
            until curl -sf http://localhost:8848/nacos/v3/admin/core/state 2>/dev/null \
              && curl -sf "http://localhost:8848/nacos/v3/admin/cs/config/list?pageNo=1&pageSize=1&dataId=&group=&search=accurate&namespaceId=public" 2>/dev/null; do
              echo "waiting for Nacos 3.2.3 (state + anonymous config list)..."; sleep 5
            done
          '
      - name: Dump V3 logs on failure
        if: failure()
        run: docker logs nacos-v3 2>&1 | tail -100
      - name: Run V3 live smoke
        env:
          NACOS_LIVE_V3_ENDPOINT: http://localhost:8848
        # --no-configuration-cache: same ExtractorService / testVintage mirror issue
        # as the V1 smoke job (see above).
        run: ./gradlew test --no-parallel --no-configuration-cache --tests "com.nanyin.nacos.search.services.operations.LiveSmokeTest.V3*"
